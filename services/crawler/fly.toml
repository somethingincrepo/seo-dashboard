# Fly.io config for the audit crawler service.
# Deploy with: cd services/crawler && fly deploy
# App name and region are set on first `fly launch`; replace below with the chosen values.

app = "something-audit-crawler"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
